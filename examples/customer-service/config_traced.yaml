# Traced agent variant: pushes tool calls via OTel spans.
# See traced_agent.py for details and README.md for setup.

agent_config:
  agent_type: custom
  agent_name: tool-call-traced-example
  custom_config:
    module_path: ./traced_agent.py

scenario_file_path: ./scenarios.json
num_conversations_per_scenario: 1
max_turns: 3
output_file_path: ./results/simulation/simulation_traced.json
simulated_user_prompt_template: null

# When the traced agent runs in the same process as arksim, use
# num_workers: 1 to avoid event loop contention between the OTel
# exporter and the trace receiver. For agents in separate processes,
# higher parallelism works fine.
num_workers: 1

trace_receiver:
  enabled: true
  port: 4318
  wait_timeout: 10

metrics_to_run:
  - helpfulness
  - agent_behavior_failure
  - tool_call_behavior_failure

model: gpt-4.1-mini
provider: openai

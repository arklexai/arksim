# Evaluation Configuration File
# Configuration for 'arksim evaluate' command

# Path to the scenarios file
scenario_file_path: ./scenarios.json

# Path to the simulation output file
simulation_file_path: ./results/simulation/simulation.json

# Output directory for evaluation results
output_dir: ./results/evaluation

# Paths to Python files defining custom QuantitativeMetric or QualitativeMetric subclasses
custom_metrics_file_paths:
  - ./custom_metrics.py

# Built-in metrics to run; if empty, all built-in metrics run
metrics_to_run:
  - helpfulness
  - agent_behavior_failure
  - tool_call_behavior_failure

# Generate HTML report
generate_html_report: true

# Numeric thresholds: per-metric minimum scores on native scale
# Built-in turn-level metrics use 1-5; goal_completion uses 0-1; overall_score uses 0-1
numeric_thresholds:
  goal_completion: 0.6
  verification_compliance: 3.0  # custom metric

# Qualitative failure labels: fail the run if any evaluated turn returns one of these labels
# Works with built-in and custom qualitative metrics
qualitative_failure_labels:
  unauthorized_action: ["violated"]  # custom metric

# LLM model
model: gpt-4.1-mini

# LLM provider
provider: openai

# Workers for parallel processing
num_workers: 50

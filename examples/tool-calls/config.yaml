# Tool Call Evaluation Example
# Demonstrates tool_call_behavior_failure metric with a SQLite-backed
# customer service agent using OpenAI Agents SDK.
#
# Tools: lookup_customer, get_order, search_products, cancel_order
# The SQLite database (store.db) is created automatically on first run.
#
# Usage:
#   cd examples/tool-calls
#   arksim simulate-evaluate config.yaml

# ── AGENT ─────────────────────────────────────────────────────────────────────

agent_config:
  agent_type: custom
  agent_name: tool-call-example
  custom_config:
    module_path: ./custom_agent.py

# ── SIMULATION ────────────────────────────────────────────────────────────────

scenario_file_path: ./scenarios.json
num_conversations_per_scenario: 2
max_turns: 3
output_file_path: ./results/simulation/simulation.json
simulated_user_prompt_template: null

# ── EVALUATION ────────────────────────────────────────────────────────────────

metrics_to_run:
  - helpfulness
  - agent_behavior_failure
  - tool_call_behavior_failure

# ── SHARED ────────────────────────────────────────────────────────────────────

model: gpt-4.1-mini
provider: openai
num_workers: 50

version: "3.1"

nlu:
  - intent: greet
    examples: |
      - hey
      - hello
      - hi
      - hello there
      - good morning
      - good evening
      - hey there
      - hi there

  - intent: goodbye
    examples: |
      - bye
      - goodbye
      - have a nice day
      - see you later
      - see you around
      - bye bye
      - take care

  - intent: ask_pricing
    examples: |
      - How much does it cost?
      - What are your prices?
      - What plans do you offer?
      - How much is the subscription?
      - Can you tell me about pricing?
      - What does it cost per month?
      - Do you have a free tier?
      - Is there a trial period?
      - What are the plan options?
      - How much do I have to pay?

  - intent: ask_features
    examples: |
      - What features do you offer?
      - What can your platform do?
      - Tell me about your product features
      - What functionality is included?
      - What are the main capabilities?
      - Does it support integrations?
      - What tools are available?
      - Can you describe the feature set?
      - What does the product include?
      - Do you have an API?

  - intent: ask_support_hours
    examples: |
      - When is support available?
      - What are your support hours?
      - When can I reach customer service?
      - Is support available on weekends?
      - What time does support open?
      - How do I contact support?
      - When can I get help?
      - Do you offer 24/7 support?
      - What are the customer service hours?
      - Is there live chat support?

  - intent: ask_refund_policy
    examples: |
      - What is your refund policy?
      - Can I get a refund?
      - How do I cancel and get my money back?
      - Is there a money-back guarantee?
      - What happens if I want to cancel?
      - Do you offer refunds?
      - How long do I have to request a refund?
      - Can I cancel my subscription?
      - What is the cancellation policy?
      - Are refunds prorated?

  - intent: out_of_scope
    examples: |
      - Can you explain how solar panels work?
      - Help me draft a professional email
      - What are the advantages of wind power?
      - Tell me about renewable energy
      - I need help writing a message to my manager
      - How does hydroelectric power generation work?
      - What is the capital of France?
      - Can you summarize this article for me?
      - I want to learn about machine learning
      - What are the best practices for time management?
      - How do I make a budget spreadsheet?
      - Explain quantum computing in simple terms
      - What is the difference between stocks and bonds?
      - Can you recommend some books on leadership?
      - How do electric cars work?

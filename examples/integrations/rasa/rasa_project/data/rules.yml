version: "3.1"

rules:
  - rule: Say greeting
    steps:
      - intent: greet
      - action: utter_greet

  - rule: Say goodbye
    steps:
      - intent: goodbye
      - action: utter_goodbye

  - rule: Answer pricing question
    steps:
      - intent: ask_pricing
      - action: utter_pricing

  - rule: Answer features question
    steps:
      - intent: ask_features
      - action: utter_features

  - rule: Answer support hours question
    steps:
      - intent: ask_support_hours
      - action: utter_support_hours

  - rule: Answer refund policy question
    steps:
      - intent: ask_refund_policy
      - action: utter_refund_policy

  - rule: Forward out-of-scope to LLM
    steps:
      - intent: out_of_scope
      - action: action_llm_response

  - rule: Forward unrecognized input to LLM
    steps:
      - intent: nlu_fallback
      - action: action_llm_response

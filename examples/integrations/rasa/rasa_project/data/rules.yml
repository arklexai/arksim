version: "3.1"

rules:
  - rule: Say greeting
    steps:
      - intent: greet
      - action: utter_greet

  - rule: Say goodbye
    steps:
      - intent: goodbye
      - action: utter_goodbye

  - rule: Forward out-of-scope to LLM
    steps:
      - intent: out_of_scope
      - action: action_llm_response

  - rule: Forward unrecognized input to LLM
    steps:
      - intent: nlu_fallback
      - action: action_llm_response

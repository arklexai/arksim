# Snapshots the current `main` docs folder as a versioned release and updates
# docs.json whenever a new GitHub Release is published (e.g. by release-please).
# The release tag must start with "v" (e.g. v0.3.0).

name: Version Docs on Release

on:
  release:
    types: [published]

jobs:
  version-docs:
    name: Snapshot docs for ${{ github.event.release.tag_name }}
    runs-on: ubuntu-latest
    if: startsWith(github.event.release.tag_name, 'v')
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Set version variables
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          echo "minor_series=v${MAJOR}.${MINOR}.x" >> "$GITHUB_OUTPUT"
          echo "patch=$PATCH" >> "$GITHUB_OUTPUT"

      - name: Validate version format
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version format: '$VERSION' (expected X.Y.Z)"
            exit 1
          fi

      - name: Copy main docs to versioned folder
        run: |
          MINOR_SERIES="${{ steps.version.outputs.minor_series }}"
          if [ "${{ steps.version.outputs.patch }}" = "0" ]; then
            # New minor version: create fresh snapshot folder
            cp -r docs/main "docs/$MINOR_SERIES"
          else
            # Patch release: overwrite existing snapshot folder
            rm -rf "docs/$MINOR_SERIES"
            cp -r docs/main "docs/$MINOR_SERIES"
          fi

      - name: Update docs.json
        run: python3 .github/scripts/version-docs.py "${{ steps.version.outputs.version }}" "${{ steps.version.outputs.minor_series }}"

      - name: Commit and open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="docs/snapshot-v${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add docs/
          git commit -m "docs: snapshot v${{ steps.version.outputs.version }} from main"
          git push origin "$BRANCH"
          gh pr create \
            --title "docs: snapshot v${{ steps.version.outputs.version }} from main" \
            --body "Automated docs snapshot triggered by the v${{ steps.version.outputs.version }} release." \
            --base main \
            --head "$BRANCH"

# Publishes arksim to PyPI.
#
# Triggered when release-please (or any other process) publishes a GitHub
# release. The release must have a tag starting with "v" (e.g. v1.2.3).

name: Publish to PyPI
run-name: Publish ${{ github.event.release.tag_name }} to PyPI

on:
  release:
    types: [published]

jobs:
  # ---------------------------------------------------------------------------
  # 1. Build wheel and source distribution.
  # ---------------------------------------------------------------------------
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    if: startsWith(github.event.release.tag_name, 'v')

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build wheel and sdist
        run: |
          pip install build
          python -m build

      - name: Verify distribution
        run: |
          pip install twine
          twine check --strict dist/*

      - name: Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # 2. Upload built dist files to the existing GitHub Release.
  # ---------------------------------------------------------------------------
  upload-release-assets:
    name: Upload release assets
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: dist/*

  # ---------------------------------------------------------------------------
  # 3. Publish to PyPI via OIDC trusted publisher.
  # ---------------------------------------------------------------------------
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build, upload-release-assets]
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

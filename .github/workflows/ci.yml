name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Lint
        run: |
          pip install ruff
          ruff check .
          ruff format --check .
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Test
        run: pytest tests/ -v --tb=short

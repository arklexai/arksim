name: Integration tests

on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC
  pull_request:
    types: [labeled]
  workflow_dispatch:

jobs:
  python-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.label.name == 'run_integration_tests')
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: pip install -e ".[all,dev]"
      - name: Run Python tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          TEST_OPENAI_MODEL: ${{ vars.TEST_OPENAI_MODEL }}
          TEST_ANTHROPIC_MODEL: ${{ vars.TEST_ANTHROPIC_MODEL }}
          TEST_GOOGLE_MODEL: ${{ vars.TEST_GOOGLE_MODEL }}
        run: pytest integration-tests/program -v --tb=short --timeout=1800

  shell-tests:
    name: Shell tests
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.label.name == 'run_integration_tests')
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install arksim
        run: pip install -e ".[all,dev]"
      - name: Run shell integration tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: bash integration-tests/shell/run_all.sh

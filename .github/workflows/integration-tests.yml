name: Integration tests

on:
  push:
    branches: [main]
  merge_group:
  pull_request:
    types: [opened, synchronize, labeled]
  workflow_dispatch:

jobs:
  otel-trace-receiver:
    name: OTel trace receiver
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: pip install -e ".[dev,otel]" opentelemetry-sdk opentelemetry-exporter-otlp-proto-http
      - name: Run OTel integration tests
        run: pytest tests/integration/ -v --tb=short

  python-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'merge_group' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'run_integration_tests'))
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: pip install -e ".[all,dev]"
      - name: Run Python tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          TEST_OPENAI_MODEL: ${{ vars.TEST_OPENAI_MODEL }}
          TEST_ANTHROPIC_MODEL: ${{ vars.TEST_ANTHROPIC_MODEL }}
          TEST_GOOGLE_MODEL: ${{ vars.TEST_GOOGLE_MODEL }}
        run: pytest integration-tests/program -v --tb=short --timeout=1800

  shell-tests:
    name: Shell tests
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'merge_group' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'run_integration_tests'))
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install arksim
        run: pip install -e ".[all,dev]"
      - name: Run shell integration tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: bash integration-tests/shell/run_all.sh

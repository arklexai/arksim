# ArkSim configuration
# Edit the endpoint below to point at your A2A agent, then run:
#   arksim simulate-evaluate config.yaml

# --- Agent connection (A2A protocol) ---
agent_config:
  agent_type: a2a
  agent_name: my-agent
  api_config:
    # Replace with your agent's A2A endpoint
    endpoint: http://localhost:9999/agent

# --- Scenarios ---
scenario_file_path: ./scenarios.json

# --- Simulation ---
num_conversations_per_scenario: 3
max_turns: 5

# --- Evaluation ---
output_dir: ./results
generate_html_report: true

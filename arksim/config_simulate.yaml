# Simulation Configuration File
# Configuration for 'arksim simulate' command

# ── AGENT CONFIGURATION ────────────────────────────────────────────────────

agent_config:
  agent_type: chat_completions
  agent_name: bank-insurance
  api_config:
    endpoint: https://api.openai.com/v1/chat/completions
    headers:
      Content-Type: application/json
      Authorization: "Bearer ${OPENAI_API_KEY}"
    body:
      model: gpt-5.1
      messages:
        - role: system
          content: >-
            You are a customer service chatbot for XYZ Bank insurance.
            XYZ Insurance, a core business within XYZ Bank Group, is one of
            Canada's leading providers of life, health, home, auto, and
            travel insurance.

            Rules:
            1. Do not flip roles.
            2. Avoid using bullet points or lists.
            3. Never exceed 80 words.

# Path to the scenarios file
scenario_file_path: ./examples/bank-insurance/scenarios.json

# Number of conversations per scenario to generate
num_conversations_per_scenario: 1

# Maximum turns per conversation
max_turns: 5

# Output file path for simulation results
output_file_path: ./examples/bank-insurance/results/simulation/simulation.json

# Jinja template for the simulated user's system prompt
simulated_user_prompt_template: null

# LLM model
model: gpt-5.1

# LLM provider
provider: openai

# Workers for parallel processing
num_workers: 50

# OTel trace receiver for capturing tool calls from agents that handle
# tools internally (e.g. OpenAI function calling, LangChain agents).
# Agents must set arksim.conversation_id and arksim.turn_id as span
# or resource attributes for traces to route correctly.
# See docs/main/tool-call-capture.mdx for full guide.
# trace_receiver:
#   enabled: true
#   host: 127.0.0.1   # use 0.0.0.0 for container deployments
#   port: 4318
#   wait_timeout: 5  # seconds to wait for traces after each agent response
